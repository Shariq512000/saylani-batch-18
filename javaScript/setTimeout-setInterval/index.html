        // }, 3000) // 2 PARAMETER => FUNCTION, TIME

        // setTimeout(function(){
        //     clearInterval(myInterval)
        // }, 10000)

        // 09:02:22
                            //9
        function formatHours(hour){
            if(hour == 0){
                return 12
            }else if(hour > 12){
                return hour - 12
            }else{
                return hour
            }
        }

        setInterval(function(){
            let currentDate = new Date();
            let formatedHours = formatHours(currentDate.getHours())
            let currentTime = `${formatedHours}:${currentDate.getMinutes()}:${currentDate.getSeconds()}`
            document.getElementById("time").innerText = currentTime
        }, 1000)

    </script>
</body>
