            localStorage.setItem("localKey5", "localValue5")
            localStorage.setItem("localKey6", "localValue6")
            localStorage.setItem("localKey7", "localValue7")

        }

        // console.log(localStorage.getItem("localKey"))

        // localStorage.removeItem("localKey")

        // localStorage.clear();

        function setSessionStorage(){
            sessionStorage.setItem("sessionKey", "sessionValue")
        }
    </script>
</body>
