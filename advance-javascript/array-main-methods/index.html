<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Methods</title>
</head>
<body>
    

    <script>
        let arr = [
            {name: "Test 1", age: 12, batch: 17},
            {name: "Test 2", age: 22, batch: 17},
            {name: "Test 3", age: 16, batch: 18},
            {name: "Test 4", age: 32, batch: 17},
            {name: "Test 5", age: 18, batch: 18},
            {name: "Test 6", age: 25, batch: 18},
            {name: "Test 7", age: 26, batch: 17},
            {name: "Test 8", age: 13, batch: 18},
            {name: "Test 9", age: 14, batch: 18},
            {name: "Test 10", age: 15, batch: 18},
        ];

        // Filter //
        // []
        let filteredArr = arr.filter((e) => e.batch == 17 && e.age >= 18) // Filter Method Returns an Array

        // let filteredArr = arr.filter(function(e){ console.log("item", e); return e.batch == 17 && e.age >= 18}) // Filter Method Returns an Array


        console.log(filteredArr)
    </script>

</body>
</html>
